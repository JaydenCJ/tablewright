<svg xmlns="http://www.w3.org/2000/svg" width="760" height="440" viewBox="0 0 760 440" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13">
  <rect width="760" height="440" rx="10" fill="#0d1117"/>
  <rect width="760" height="34" rx="10" fill="#161b22"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="17" r="6" fill="#febc2e"/>
  <circle cx="60" cy="17" r="6" fill="#28c840"/>
  <text x="380" y="21" fill="#8b949e" text-anchor="middle">tablewright — fmt · sort · edit · convert</text>

  <text x="24" y="64" fill="#7ee787">$ tablewright sort notes.md --by "Unit price" --desc</text>
  <text x="24" y="88" fill="#c9d1d9" xml:space="preserve">| Item                         | Qty | Unit price |</text>
  <text x="24" y="108" fill="#8b949e" xml:space="preserve">| ---------------------------- | --: | ---------: |</text>
  <text x="24" y="128" fill="#c9d1d9" xml:space="preserve">| Gadget with a very long name |  10 |     $1,200 |</text>
  <text x="24" y="148" fill="#c9d1d9" xml:space="preserve">| 部品セット                   |   3 |     ¥1,000 |</text>
  <text x="24" y="168" fill="#c9d1d9" xml:space="preserve">| Widget                       |   2 |      $9.50 |</text>

  <text x="24" y="202" fill="#7ee787">$ tablewright set C1 "$8.75" notes.md --write</text>
  <text x="24" y="222" fill="#7ee787">$ tablewright get C1 notes.md</text>
  <text x="24" y="242" fill="#c9d1d9">$8.75</text>

  <text x="24" y="276" fill="#7ee787">$ tablewright convert notes.md --to csv</text>
  <text x="24" y="296" fill="#c9d1d9">Item,Qty,Unit price</text>
  <text x="24" y="316" fill="#c9d1d9">Gadget with a very long name,10,<tspan fill="#d29922">"$1,200"</tspan></text>
  <text x="24" y="336" fill="#c9d1d9">部品セット,3,<tspan fill="#d29922">"¥1,000"</tspan></text>

  <text x="24" y="370" fill="#7ee787">$ tablewright fmt --check docs/*.md</text>
  <text x="24" y="390" fill="#c9d1d9">would reformat: docs/setup.md</text>
  <text x="24" y="410" fill="#8b949e">exit 1 — wire it into your pre-commit hook</text>
</svg>
